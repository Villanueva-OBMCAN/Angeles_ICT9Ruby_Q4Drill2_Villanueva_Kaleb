<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Drill 2</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-image: url(heatindex.jpg);
            background-repeat: no-repeat;
            background-size: cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            
        }

        .container-box {
            background: rgb(232, 140, 3);
            padding: 30px;
            border-radius: 20px;
            height: 300px;
            width: 500px;
            text-align: center;
        }

        h2 {
            margin-bottom: 15px;
        }

        input {
            margin-bottom: 10px;
        }

        button {
            margin-top: 10px;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="container-box">
        <h2 style="background-color: white;">Heat Index Checker</h2>
        <p>Enter temperature and humidity:</p>

        <input type="number" id="temperature" class="form-control" placeholder="Temperature (°C)">
        <input type="number" id="humidity" class="form-control" placeholder="Humidity (%)">

        <button class="btn btn-primary" onclick="calculateHeatIndex()" style="background-color: orangered; color: black; border: none;">
            Calculate
        </button>
    </div>

   <script>
function calculateHeatIndex(){
    var temperature = parseFloat(document.getElementById("temperature").value);
    var humidity = parseFloat(document.getElementById("humidity").value);
    var heatIndex;

    heatIndex = temperature + (0.33 * humidity) - 4;

    var message;

    switch(true){
        case (heatIndex < 27):
            message = "Normal";
            break;
        case (heatIndex >= 27 && heatIndex < 32):
            message = "Caution";
            break;
        case (heatIndex >= 32 && heatIndex < 41):
            message = "Extreme Caution";
            break;
        case (heatIndex >= 41 && heatIndex < 54):
            message = "Danger";
            break;
        default:
            message = "Extreme Danger";
    }

    alert("Heat Index: " + heatIndex.toFixed(2) + "°C\n" + message);
}
</script>

</body>
</html>
